apiVersion: apps/v1
kind: Deployment

metadata:
  name: retailpulse

spec:
  replicas: 2

  selector:
    matchLabels:
      app: retailpulse

  template:
    metadata:
      labels:
        app: retailpulse

    spec:
      containers:
      - name: retailpulse
        image: retailpulse:latest

        ports:
        - containerPort: 8501

        imagePullPolicy: IfNotPresent